name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create project files
        run: |
          mkdir -p app
          echo '' | base64 -d > app/build.gradle
          mkdir -p app/src/main
          echo '' | base64 -d > app/src/main/AndroidManifest.xml
          mkdir -p app/src/main/java/com/hc05/weightscale
          echo '' | base64 -d > app/src/main/java/com/hc05/weightscale/BluetoothService.kt
          mkdir -p app/src/main/java/com/hc05/weightscale
          echo '' | base64 -d > app/src/main/java/com/hc05/weightscale/MainActivity.kt
          mkdir -p app/src/main/java/com/hc05/weightscale
          echo '' | base64 -d > app/src/main/java/com/hc05/weightscale/WeightDisplayActivity.kt
          mkdir -p app/src/main/java/com/hc05/weightscale
          echo '' | base64 -d > app/src/main/java/com/hc05/weightscale/WeightLiveActivity.kt
          mkdir -p app/src/main/java/com/hc05/weightscale
          echo '' | base64 -d > app/src/main/java/com/hc05/weightscale/WeightScreenActivity.kt
          mkdir -p app/src/main/res/layout
          echo '' | base64 -d > app/src/main/res/layout/activity_main.xml
          mkdir -p app/src/main/res/layout
          echo '' | base64 -d > app/src/main/res/layout/activity_main1.xml
          mkdir -p app/src/main/res/layout
          echo '' | base64 -d > app/src/main/res/layout/activity_weight.xml
          mkdir -p app/src/main/res/layout
          echo '' | base64 -d > app/src/main/res/layout/activity_weightlive.xml
          mkdir -p app/src/main/res/values
          echo 'PHJlc291cmNlcz4KICAgIDxzdHJpbmcgbmFtZT0iYXBwX25hbWUiPkhDLTA1IFdlaWdodCBTY2FsZTwvc3RyaW5nPgo8L3Jlc291cmNlcz4K' | base64 -d > app/src/main/res/values/strings.xml
          mkdir -p app/src/main/res/values
          echo '' | base64 -d > app/src/main/res/values/themes.xml

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L 'https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar' -o gradle/wrapper/gradle-wrapper.jar

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HC05-WeightScale-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
